version: '3.8'

services:
  segmentation-api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - MODEL_PATH=/app/models/segmentation.pth
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

 