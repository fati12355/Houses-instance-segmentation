name: Segmentation Model CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  # JOB 1: Test Code
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black
      
      - name: Lint code
        run: |
          flake8 src/ --max-line-length=120 --ignore=E203,W503 || true
          black --check src/ --line-length 120 || true
      
      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=src --cov-report=xml || echo "No tests found"
      
      - name: Test secrets loading
        run: |
          echo "TEST_SECRET=test123" >> .env
          python -c "from src.secrets import secrets; print('Secrets module works')"
          rm .env

  # JOB 2: Build and Push Docker Image
  build:
    runs-on: ubuntu-latest
    needs: test 
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/house-segmentation:latest
            ${{ secrets.DOCKER_USERNAME }}/house-segmentation:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # JOB 3: Deploy to AWS EC2
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          # Save SSH key
          echo "${{ secrets.EC2_SSH_KEY }}" > deploy_key.pem
          chmod 600 deploy_key.pem
          
          # Deploy via SSH (pass DOCKER_PASSWORD as variable)
          ssh -o StrictHostKeyChecking=no -i deploy_key.pem $EC2_USER@$EC2_HOST << EOF
            # Login to Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "$DOCKER_USERNAME" --password-stdin
            
            # Pull latest image
            docker pull $DOCKER_USERNAME/house-segmentation:latest
            
            # Stop and remove old container
            docker stop house-segmentation-app || true
            docker rm house-segmentation-app || true
            
            # Run new container
            docker run -d \
              --name house-segmentation-app \
              --restart unless-stopped \
              -p 5000:5000 \
              $DOCKER_USERNAME/house-segmentation:latest
            
            # Clean up old images
            docker image prune -a -f
          EOF
          
          # Clean up
          rm -f deploy_key.pem
      
      - name: Verify deployment
        run: |
          echo "✅ Deployment completed!"
          echo "🌐 API available at: http://${{ secrets.EC2_HOST }}:5000"
          echo "🔍 Health check: http://${{ secrets.EC2_HOST }}:5000/health"