name: Segmentation Model CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_HUB_REPO: yourusername/house-segmentation #to be updated
  AWS_REGION: us-east-1
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  # JOB 1: Test Code
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black
      
      - name: Lint code
        run: |
          flake8 src/ --max-line-length=120 --ignore=E203,W503
          black --check src/
      
      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=src --cov-report=xml
      
      - name: Test secrets loading
        run: |
          echo "TEST_SECRET=test123" >> .env
          python -c "from src.secrets import secrets; assert secrets.get_secret('TEST_SECRET') == 'test123'"
          rm .env
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  # JOB 2: Build Docker Image
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_HUB_REPO }}:latest
            ${{ env.DOCKER_HUB_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_HUB_REPO }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # JOB 3: Train Model (Optional - expensive)
  train:
    runs-on: ubuntu-latest
    needs: test
    if: false  # Disable for now (training is expensive)
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Train model
        run: |
          python src/train.py --epochs 50 --batch-size 8
      
      - name: Upload model artifact
        uses: actions/upload-artifact@v3
        with:
          name: trained-model
          path: models/segmentation_model.pth

  # JOB 4: Deploy to AWS EC2 
deploy:
  runs-on: ubuntu-latest
  needs: build
  if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  
  steps:
    - name: Deploy to EC2
      env:
        EC2_HOST: ${{ secrets.EC2_HOST }}
        EC2_USER: ${{ secrets.EC2_USER }}
        EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      run: |
        # Save SSH key
        echo "$EC2_SSH_KEY" > deploy_key.pem
        chmod 600 deploy_key.pem
        
        # Deploy via SSH
        ssh -o StrictHostKeyChecking=no -i deploy_key.pem $EC2_USER@$EC2_HOST << EOF
          # Login to Docker Hub
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
          
          # Pull latest image
          docker pull $DOCKER_USERNAME/building-segmentation:latest
          
          # Stop and remove old container
          docker stop building-segmentation-app || true
          docker rm building-segmentation-app || true
          
          # Run new container
          docker run -d \
            --name building-segmentation-app \
            --restart unless-stopped \
            -p 5000:5000 \
            $DOCKER_USERNAME/building-segmentation:latest
          
          # Clean up old images
          docker image prune -a -f
        EOF
        
        # Clean up
        rm -f deploy_key.pem
    
    - name: Verify deployment
      run: |
        sleep 10
        echo " Deployment completed!"
        echo " API available at: http://${{ secrets.EC2_HOST }}:5000"
        echo " Health check: http://${{ secrets.EC2_HOST }}:5000/health"